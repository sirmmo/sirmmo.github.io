<div class="marg marg--wide">
  <h3 class="marg__head">{{ .Site.Data.socials.title | default "Elsewhere" }}</h3>
  <div class="elsewhere">
    {{ range .Site.Data.socials.list }}
      {{ range . }}
        <a href="{{ .url }}" target="_blank" rel="noopener" title="{{ .name }}">{{ .name }}</a>
      {{ end }}
    {{ end }}
  </div>
</div>
