{{ if .Site.Data.teaching.show }}
<section class="section" aria-labelledby="teach-title">
  <div class="section__head">
    <span class="section__num">§ VI</span>
    <h2 id="teach-title" class="section__title">{{ .Site.Data.teaching.title }}</h2>
    <span class="section__rule" aria-hidden="true"></span>
  </div>
  <div class="formerly">
    {{ range .Site.Data.teaching.list }}<span>{{ .name }}</span>{{ end }}
  </div>
</section>
{{ end }}
