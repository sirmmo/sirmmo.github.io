{{ $t := .Site.Data.topology }}
{{ $nodes := $t.nodes }}
<div class="topology">
  {{ with $t.intro }}<p class="topology__intro">{{ . }}</p>{{ end }}
  <div class="topology__scroll">
    <svg class="topology__map" viewBox="{{ $t.viewbox }}" role="img" aria-labelledby="topology-title">
      <title id="topology-title">Topology of practice</title>
      <g class="topology__edges" aria-hidden="true">
        {{ range $e := $t.edges }}
          {{ $from := index (where $nodes "id" $e.from) 0 }}
          {{ $to   := index (where $nodes "id" $e.to)   0 }}
          {{ if and $from $to }}
            {{ $dx := sub $to.x $from.x }}
            {{ $dy := sub $to.y $from.y }}
            {{ $midx := div (add $from.x $to.x) 2.0 }}
            {{ $midy := div (add $from.y $to.y) 2.0 }}
            {{ $cx := add $midx (mul $dy 0.06) }}
            {{ $cy := sub $midy (mul $dx 0.06) }}
            <path class="topology__edge{{ if eq $e.kind "meta" }} topology__edge--meta{{ end }}" d="M {{ $from.x }},{{ $from.y }} Q {{ $cx }},{{ $cy }} {{ $to.x }},{{ $to.y }}" />
          {{ end }}
        {{ end }}
      </g>
      <g class="topology__nodes">
        {{ range $n := $nodes }}
          {{ if eq $n.kind "arch" }}
            <g class="topology__node topology__node--arch" transform="translate({{ $n.x }} {{ $n.y }})">
              <text class="topology__node-label" text-anchor="middle" y="4">{{ $n.label }}</text>
            </g>
          {{ else }}
            <g class="topology__node topology__node--{{ $n.tier }} topology__node--{{ $n.group }}" transform="translate({{ $n.x }} {{ $n.y }})">
              <circle class="topology__node-dot" cx="0" cy="0" />
              <text class="topology__node-label" x="9" y="4">{{ $n.label }}</text>
            </g>
          {{ end }}
        {{ end }}
      </g>
    </svg>
  </div>
  <ul class="topology__legend" aria-label="Legend">
    <li><span class="topology__swatch topology__swatch--geo" aria-hidden="true"></span>Geospatial</li>
    <li><span class="topology__swatch topology__swatch--lang" aria-hidden="true"></span>Languages</li>
    <li><span class="topology__swatch topology__swatch--backend" aria-hidden="true"></span>Backend &amp; data</li>
    <li><span class="topology__swatch topology__swatch--frontend" aria-hidden="true"></span>Frontend</li>
    <li><span class="topology__swatch topology__swatch--ai" aria-hidden="true"></span>AI / LLM</li>
    <li><span class="topology__swatch topology__swatch--realtime" aria-hidden="true"></span>Real-time</li>
    <li><span class="topology__swatch topology__swatch--ops" aria-hidden="true"></span>Platform</li>
    <li><span class="topology__swatch topology__swatch--allied" aria-hidden="true"></span>Allied</li>
    <li><em class="topology__legend-arch">Architecture</em></li>
  </ul>
</div>
