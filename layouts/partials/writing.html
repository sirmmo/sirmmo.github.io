<div class="dispatches" id="dispatches">
  <p class="dispatches__empty" data-loading>Loading recent writing…</p>
</div>

<script>
  (function () {
    var mount = document.getElementById('dispatches');
    if (!mount) return;
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@ingmmo')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var items = (data.items || []).filter(function (i) { return i.categories && i.categories.length > 0; }).slice(0, 6);
        if (!items.length) {
          mount.innerHTML = '<p class="dispatches__empty">No recent dispatches.</p>';
          return;
        }
        var html = items.map(function (item) {
          var date = (item.pubDate || '').slice(0, 10);
          var title = item.title || 'Untitled';
          return '<article class="dispatch">' +
            '<h3 class="dispatch__title"><a href="' + item.link + '" target="_blank" rel="noopener">' + title + '</a></h3>' +
            '<time class="dispatch__date" datetime="' + date + '">' + date + '</time>' +
            '</article>';
        }).join('');
        mount.innerHTML = html;
      })
      .catch(function () {
        mount.innerHTML = '<p class="dispatches__empty">Couldn’t reach the feed right now. <a href="https://medium.com/@ingmmo" target="_blank" rel="noopener">Read on Medium</a>.</p>';
      });
  })();
</script>
